<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* STAR BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:.7;
}

/* CENTER */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* MENU */
.menu{display:none;margin-top:10px;}
button{
  margin:5px;
  padding:10px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* PAGE */
.page{display:none;margin-top:15px;max-width:500px;}
.box{
  border:1px solid white;
  padding:15px;
}

/* HIDE ENTER AFTER CLICK */
.hide{display:none;}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container">

<h2>BLACKLIGHTDOMS</h2>

<button id="enterBtn" onclick="enter()">ENTER</button>

<div class="menu" id="menu">
<button onclick="openPage('origin')">ORIGIN</button>
<button onclick="openPage('quotes')">QUOTES</button>
<button onclick="openPage('archives')">ARCHIVES</button>
<button onclick="openPage('code')">CODE</button>
</div>

<!-- ORIGIN -->
<div class="page" id="origin">
<div class="box">
BLDS lahir dari kegelapan dan kegagalan.
</div>
</div>

<!-- QUOTES -->
<div class="page" id="quotes">
<div class="box" id="quoteBox">Klik refresh</div>
<button onclick="newQuote()">REFRESH</button>
</div>

<!-- ARCHIVES -->
<div class="page" id="archives">
<div class="box">
BLDS Born 2024<br>
Community Started 2024<br>
Massive Remake 2025
</div>
</div>

<!-- CODE -->
<div class="page" id="code">
<div class="box">
<input id="codeInput" placeholder="code">
<button onclick="checkCode()">OK</button>
</div>
</div>

</div>

<!-- FORGOTTEN -->
<div id="forgotten" style="display:none;position:fixed;inset:0;background:black;align-items:center;justify-content:center;font-size:20px;">
FORGOTTEN MEMORY DETECTED
</div>

<script>

/* STAR */
const bg=document.getElementById("bg");

for(let i=0;i<80;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  bg.appendChild(s);
}

/* ENTER */
function enter(){
  document.getElementById("menu").style.display="block";
  document.getElementById("enterBtn").classList.add("hide");
}

/* NAV */
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

/* QUOTES */
const quotes=[
"BLDS never breaks.",
"From darkness we rise.",
"Memory defines us.",
"Eclipse continues.",
"Survive and evolve."
];

function newQuote(){
  document.getElementById("quoteBox").innerText=
  quotes[Math.floor(Math.random()*quotes.length)];
}

/* CODE */
function checkCode(){
  let v=document.getElementById("codeInput").value.toLowerCase();

  if(v==="forgotten"){
    document.getElementById("forgotten").style.display="flex";
    setTimeout(()=>{
      document.getElementById("forgotten").style.display="none";
    },2000);
  }
}

</script>

</body>
</html>
