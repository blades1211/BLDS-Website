<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS | BlackLightDoms</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Poppins,sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* CENTER FIX */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  position:relative;
  z-index:2;
}

/* SKY */
.sky{
  position:fixed;
  inset:0;
  background:linear-gradient(#000,#02040f);
  z-index:-3;
}

/* STAR */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:.7;
  animation:fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* ECLIPSE */
.eclipse{
  position:fixed;
  top:50%;
  left:50%;
  width:320px;
  height:320px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.8),transparent 70%);
  opacity:.15;
  animation:move 10s infinite ease-in-out;
  z-index:-2;
}
@keyframes move{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.3);}
}

/* LOGO */
.logo{
  width:130px;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 10px white);
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* BUTTON */
button{
  padding:10px 18px;
  margin:6px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  background:white;
  color:black;
}

/* MENU */
.menu{
  display:none;
  flex-direction:column;
  margin-top:15px;
}

/* PAGE */
.page{
  display:none;
  max-width:800px;
  margin-top:20px;
}

.box{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.1);
  padding:20px;
  border-radius:16px;
  text-align:left;
  line-height:1.8;
}

/* FLAME */
.flame{
  display:block;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
  text-shadow:0 0 10px orange,0 0 25px red;
}
.flame.active{
  opacity:1;
  transform:translateY(0);
}

/* CUTSCENE */
.cutscene{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}

.glitch{
  animation:glitch .2s infinite;
}
@keyframes glitch{
  0%,100%{opacity:1;}
  50%{opacity:.3;}
}

.bigLogo{
  width:220px;
  opacity:0;
  transition:1s;
  filter:drop-shadow(0 0 25px white);
}
.show{opacity:1;}

.fadeOut{
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<div class="sky" id="sky"></div>
<div class="eclipse" id="eclipse"></div>

<div class="container" id="main">

<img src="logo.png" class="logo">
<h2>BLACKLIGHTDOMS</h2>

<button onclick="enter()">ENTER THE ECLIPSE</button>

<div class="menu" id="menu">
<button onclick="show('origin')">ORIGIN</button>
<button onclick="show('forgot')">FORGOTTEN</button>
<button onclick="show('code')">CODE</button>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
<div class="box">
<h2>THE ORIGIN</h2><br>
BLDS lahir dari kegelapan absolut.<br>
Mereka yang bertahan bukan yang terkuat… tapi yang tidak menghilang.
</div>
</div>

<!-- FORGOTTEN -->
<div id="forgot" class="page">
<div class="box">
<h2>FORGOTTEN ECLIPSE</h2><br>
Sistem lama runtuh karena kesadaran terlalu dalam.<br><br>
<b>“Jangan ulangi Core.”</b>
</div>
</div>

<!-- CODE -->
<div id="code" class="page">
<div class="box">
<h2>CODE</h2>
<input id="inp" placeholder="type code">
</div>
</div>

</div>

<!-- CUTSCENES -->
<div class="cutscene" id="cutForgot">
<h1 class="glitch">FORGOTTEN MEMORY DETECTED</h1>
</div>

<div class="cutscene" id="cutFlame">
<img src="logo.png" class="bigLogo" id="bigLogo">
</div>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b8b1d3.mp3">
</audio>

<script>

/* STARS */
const sky=document.getElementById("sky");
for(let i=0;i<140;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*-100+"vh";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  sky.appendChild(s);
}

/* ENTER FIX */
function enter(){
  document.getElementById("menu").style.display="flex";
  document.querySelector("button").style.display="none";
  document.getElementById("eclipse").style.opacity="0.05";
}

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

/* AUDIO */
const bgm=document.getElementById("bgm");

/* FLAME SOUND */
const sfx=new Audio("https://cdn.pixabay.com/audio/2021/08/04/audio_5c0d7a4b6a.mp3");

/* FLAMES */
function flameSequence(){
  const flames=document.querySelectorAll(".flame");
  let i=0;

  let t=setInterval(()=>{
    if(i<flames.length){
      flames[i].classList.add("active");
      sfx.currentTime=0;
      sfx.play().catch(()=>{});
      i++;
    } else clearInterval(t);
  },250);
}

/* 12 FLAMES CUTSCENE */
function twelveFlames(){
  const cut=document.getElementById("cutFlame");
  const logo=document.getElementById("bigLogo");

  cut.style.display="flex";
  bgm.play().catch(()=>{});

  setTimeout(()=>{
    logo.classList.add("show");
    flameSequence();
  },800);

  setTimeout(()=>{
    cut.style.display="none";
    logo.classList.remove("show");
  },6000);
}

/* FORGOTTEN CINEMATIC */
function forgotten(){
  const cut=document.getElementById("cutForgot");
  cut.style.display="flex";

  setTimeout(()=>{
    cut.style.display="none";
  },2200);
}

/* CODE */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const v=document.getElementById("inp").value.toLowerCase();

    if(v==="forgotten") forgotten();
    if(v==="12flames"||v==="12 flames") twelveFlames();
  }
});

</script>

</body>
</html>
