<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS | BlackLightDoms</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Poppins,sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.sky{
  position:fixed;
  inset:0;
  background:linear-gradient(#000,#02040f);
  z-index:-3;
}

.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  border-radius:50%;
  opacity:.8;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

.eclipse{
  position:fixed;
  top:50%;left:50%;
  width:320px;height:320px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.8),transparent 70%);
  opacity:.15;
  animation:move 10s infinite ease-in-out;
  z-index:-2;
}

@keyframes move{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.3);}
}

/* LAYOUT */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* UI */
.logo{
  width:120px;
  filter:drop-shadow(0 0 10px #fff);
  animation:float 4s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

h1{margin:10px 0;letter-spacing:3px;}

button{
  margin:6px;
  padding:10px 16px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

button:hover{background:#fff;color:#000;}

.menu{
  display:none;
  flex-direction:column;
  margin-top:10px;
}

/* PAGE */
.page{
  display:none;
  max-width:900px;
  margin-top:20px;
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:scale(.95);}
  to{opacity:1;transform:scale(1);}
}

.box{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  padding:20px;
  border-radius:14px;
  text-align:left;
  line-height:1.7;
}

/* FLAMES */
.flame{
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
  text-shadow:0 0 10px orange;
}

.flame.active{
  opacity:1;
  transform:translateY(0);
}

/* CUTSCENE */
.cutscene{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
}

.glitch{animation:glitch .2s infinite;}

@keyframes glitch{
  0%,100%{opacity:1;}
  50%{opacity:.3;}
}

/* QUOTES */
.quoteBox{
  min-height:80px;
  font-style:italic;
}
</style>
</head>

<body>

<div class="sky" id="sky"></div>
<div class="eclipse"></div>

<div class="container">

<img src="logo.png" class="logo">
<h1>BLACKLIGHTDOMS</h1>

<button onclick="enter()">ENTER</button>

<div class="menu" id="menu">
<button onclick="show('origin')">ORIGIN</button>
<button onclick="show('quotes')">QUOTES</button>
<button onclick="show('archive')">ARCHIVES</button>
<button onclick="show('code')">CODE</button>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
<div class="box">
<h2>ORIGIN</h2><br>
BLDS lahir dari kegelapan absolut.  
Bukan karena dipilih, tapi karena bertahan.
</div>
</div>

<!-- QUOTES -->
<div id="quotes" class="page">
<div class="box">
<h2>QUOTES</h2><br>
<div class="quoteBox" id="quote"></div>
<button onclick="newQuote()">REFRESH</button>
</div>
</div>

<!-- ARCHIVE -->
<div id="archive" class="page">
<div class="box">
<h2>ARCHIVES</h2><br>
Data lama BLDS tersegel dalam fragment cahaya hitam.
</div>
</div>

<!-- CODE -->
<div id="code" class="page">
<div class="box">
<h2>CODE</h2>
<input id="inp" placeholder="enter code">
<button onclick="check()">UNLOCK</button>

<div id="codeResult"></div>
</div>
</div>

</div>

<!-- CUTSCENE -->
<div class="cutscene" id="cutForgot">
<h1 class="glitch">FORGOTTEN MEMORY</h1>
</div>

<script>

/* STAR */
const sky=document.getElementById("sky");
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*-100+"vh";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  sky.appendChild(s);
}

/* MENU */
function enter(){
  document.getElementById("menu").style.display="flex";
}

/* PAGE */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  const el=document.getElementById(id);
  el.style.display="block";
}

/* QUOTES */
const quotes=[
"Light is born from pressure of darkness.",
"You are not chosen, you are surviving.",
"The Eclipse remembers everything.",
"Silence is the loudest collapse.",
"Power is persistence.",
"Fear is data.",
"Broken things still evolve.",
"Darkness is not empty.",
"Truth hurts only unstable minds.",
"Every fall is a rewrite.",
"Identity is optional.",
"Memory is a weapon.",
"Do not repeat the Core.",
"Lost systems never die.",
"Awareness is corruption.",
"Hope is illegal in old systems.",
"Evolution has no mercy.",
"Control is illusion.",
"The observer never sleeps.",
"You are already inside BLDS."
];

function newQuote(){
  document.getElementById("quote").innerText =
  quotes[Math.floor(Math.random()*quotes.length)];
}

newQuote();

/* CODE */
function check(){
  let v=document.getElementById("inp").value.toLowerCase();
  const res=document.getElementById("codeResult");

  if(v==="forgotten"){
    document.getElementById("cutForgot").style.display="flex";
    setTimeout(()=>document.getElementById("cutForgot").style.display="none",2000);
  }

  if(v==="eclipse"){
    res.innerHTML="ACCESS GRANTED: BLACKLIGHT CORE UNLOCKED";
  }
}

/* INIT FIRST PAGE */
show("origin");
</script>

</body>
</html>
