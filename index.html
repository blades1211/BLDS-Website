<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS | ECLIPSE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:black;
  color:white;
  font-family:Poppins;
}

/* ===== PAGES ===== */
.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== LANDING ===== */
#landing{
  display:flex;
}

/* ===== HUB ===== */
#hub{
  padding:30px;
}

/* ===== BUTTON ===== */
button{
  padding:12px 20px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:20px;
  cursor:pointer;
  margin:5px;
  transition:0.3s;
}

button:hover{
  background:white;
  color:black;
}

/* ===== TITLE ===== */
h1{
  font-family:Orbitron;
  font-size:3rem;
  text-align:center;
}

/* ===== HUB GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  width:100%;
  max-width:800px;
  margin-top:20px;
}

/* ===== CARD ===== */
.card{
  border:1px solid #333;
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* ===== SECRET ===== */
#secret{
  display:none;
  padding:20px;
  text-align:center;
}

</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="page" style="display:flex;">
  <div style="text-align:center;">
    <h1>BLACKLIGHTDOMINION</h1>
    <button onclick="enter()">ENTER THE ECLIPSE</button>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="page">

  <h1>ECLIPSE HUB</h1>

  <div class="grid">

    <div class="card">
      <button onclick="openOrigin()">ORIGIN</button>
    </div>

    <div class="card">
      <button onclick="openPage('lore')">LORE DATABASE</button>
    </div>

    <div class="card">
      <button onclick="openPage('archive')">ARCHIVE</button>
    </div>

    <div class="card">
      <button onclick="openPage('quotes')">QUOTES</button>
    </div>

    <div class="card">
      <button onclick="openPage('status')">STATUS</button>
    </div>

  </div>

</div>

<!-- ORIGIN -->
<div id="origin" class="page">
  <h2>ORIGIN NODE</h2>
  <p>Klik 5x untuk unlock SECRET</p>
  <button onclick="originClick()">CLICK</button>
</div>

<!-- SECRET -->
<div id="secret" class="page">
  <h2>THE FORGOTTEN ECLIPSE</h2>
  <p>The system remembers what was erased...</p>
</div>

<!-- LORE -->
<div id="lore" class="page">
  <h2>LORE DATABASE</h2>
  <p>Ancient BLDS data stored in the Core.</p>
</div>

<!-- ARCHIVE -->
<div id="archive" class="page">
  <h2>ARCHIVE</h2>
  <p>Timeline history BLDS.</p>
</div>

<!-- QUOTES -->
<div id="quotes" class="page">
  <h2>QUOTES</h2>
  <p>"Darkness builds legends."</p>
</div>

<!-- STATUS -->
<div id="status" class="page">
  <h2>SYSTEM STATUS</h2>
  <p>CORE: ACTIVE</p>
</div>

<script>

let originCount = 0;

/* ENTER */
function enter(){
  switchPage("hub");
}

/* PAGE SWITCH */
function switchPage(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.style.display="none";
  });
  document.getElementById(id).style.display="flex";
}

/* OPEN PAGE FROM HUB */
function openPage(id){
  switchPage(id);
}

/* ORIGIN */
function openOrigin(){
  switchPage("origin");
}

function originClick(){
  originCount++;

  if(originCount >= 5){
    switchPage("secret");
  }
}

</script>

</body>
</html>
