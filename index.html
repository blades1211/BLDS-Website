<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:Poppins,sans-serif;
  min-height:100vh;
  overflow-y:auto;   /* ✅ FIX SCROLL */
  overflow-x:hidden;
}

/* SKY + STARS */
.sky{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#0a0f1f,#000);
  z-index:-3;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:.8;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* CENTER WRAPPER */
.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:700px;
  text-align:center;
}

/* LOGO */
.logo{
  width:120px;
  filter:drop-shadow(0 0 10px white);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* TITLE */
h2{
  letter-spacing:4px;
  margin:10px 0;
}

/* BUTTON */
button{
  padding:10px 16px;
  margin:6px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:12px;
  cursor:pointer;
}

button:hover{
  background:white;
  color:black;
}

/* MENU */
.menu{
  display:none;
  flex-direction:column;
  margin-top:20px;
}

/* PAGE */
.page{
  display:none;
  margin-top:20px;
  text-align:left;
}

.box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  padding:18px;
  border-radius:14px;
  line-height:1.7;
}

/* FLAMES */
.flame{
  display:block;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
  text-shadow:0 0 10px orange;
}

.flame.active{
  opacity:1;
  transform:translateY(0);
}

/* CUTSCENE */
.cutscene{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  text-align:center;
  flex-direction:column;
}

/* FADE */
.fade{
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0;transform:scale(.95);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="sky" id="sky"></div>

<div class="wrapper">

<div class="container fade">

<img src="logo.png" class="logo">
<h2>BLACKLIGHTDOMS</h2>

<button onclick="enter()">ENTER ECLIPSE</button>

<div class="menu" id="menu">
<button onclick="show('origin')">ORIGIN</button>
<button onclick="show('code')">CODE</button>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
<div class="box">

<h2>ORIGIN</h2><br>

Before BLDS, only silence existed.<br>
No identity. No meaning.<br><br>

They survived not because they were strong…<br>
but because they refused to disappear.<br><br>

<b>True light is born from darkness pressure.</b>

</div>
</div>

<!-- CODE -->
<div id="code" class="page">
<div class="box">

<h2>CODE</h2>
<input id="inp" placeholder="type code">
<br>
<button onclick="check()">UNLOCK</button>

</div>
</div>

</div>
</div>

<!-- CUTSCENES -->
<div class="cutscene" id="cutForgot">
<h1>FORGOTTEN MEMORY</h1>
</div>

<div class="cutscene" id="cutFlame">
<h1>12 FLAMES ACTIVATED</h1>
</div>

<script>

/* STAR FIX */
const sky=document.getElementById("sky");

for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*-100+"vh";
  s.style.animationDuration=(3+Math.random()*6)+"s";
  sky.appendChild(s);
}

/* MENU */
function enter(){
  document.getElementById("menu").style.display="flex";
}

/* PAGE */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

/* CODE */
function check(){
  let v=document.getElementById("inp").value.toLowerCase();

  if(v==="forgotten"){
    let c=document.getElementById("cutForgot");
    c.style.display="flex";
    setTimeout(()=>c.style.display="none",2000);
  }

  if(v==="12flames"){
    let c=document.getElementById("cutFlame");
    c.style.display="flex";
    setTimeout(()=>c.style.display="none",2000);
  }
}

/* AUDIO FIX */
const audio=new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b8b1d3.mp3");
audio.loop=true;

document.body.addEventListener("click",()=>{
  audio.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
