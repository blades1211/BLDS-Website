<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS | BlackLightDoms</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:Poppins;
  overflow-x:hidden;
}

/* SKY */
.sky{
  position:fixed;
  inset:0;
  background:linear-gradient(#000,#02040f);
  z-index:-2;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

input{
  padding:12px;
  border:1px solid white;
  background:transparent;
  color:white;
  text-align:center;
  border-radius:10px;
}

/* BUTTON */
button{
  padding:10px 20px;
  margin:10px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
button:hover{background:white;color:black}

/* MAIN */
.container{
  display:none;
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:20px;
}

.menu{display:none;flex-direction:column;margin-top:20px}

.page{
  display:none;
  max-width:800px;
  margin-top:20px;
}

.box{
  padding:20px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
  background:rgba(255,255,255,0.03);
  text-align:left;
  line-height:1.6;
}

.backBtn{
  position:fixed;
  top:10px;
  left:10px;
  display:none;
}

</style>
</head>

<body>

<div class="sky" id="sky"></div>

<!-- LOGIN -->
<div id="login">
  <h2>ENTER CODE</h2>
  <input id="code">
  <button onclick="checkCode()">ENTER</button>
</div>

<div class="container" id="main">

<h1>BLDS SYSTEM</h1>

<button onclick="enter()">ENTER THE ECLIPSE</button>

<div class="menu" id="menu">
<button onclick="show('lore')">ORIGIN</button>
<button onclick="show('quotes')">QUOTES</button>
<button onclick="show('code')">CODE</button>
<button onclick="show('archive')">ARCHIVE</button>
</div>

<button class="backBtn" id="back" onclick="back()">BACK</button>

<!-- LORE -->
<div id="lore" class="page">
<div class="box">

<h2>ORIGIN</h2>
Before BLDS had a name, there was only darkness and survival.

</div>
</div>

<!-- QUOTES -->
<div id="quotes" class="page">
<div class="box">
<div id="quote"></div>
<button onclick="newQuote()">NEXT</button>
</div>
</div>

<!-- CODE -->
<div id="code" class="page">
<div class="box">

<h2>FORGOTTEN ACCESS</h2>

<input id="forgotInput" placeholder="enter code...">
<button onclick="checkForgotten()">UNLOCK</button>

<p id="msg"></p>

</div>
</div>

<!-- ARCHIVE -->
<div id="archive" class="page">
<div class="box">
<div id="archiveData"></div>
</div>
</div>

</div>

<script>

/* SKY */
const sky=document.getElementById("sky");
for(let i=0;i<120;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.top=(-Math.random()*100)+"vh";
 s.style.animationDuration=(3+Math.random()*5)+"s";
 sky.appendChild(s);
}

/* LOGIN */
function checkCode(){
 if(document.getElementById("code").value==="Dominion"){
   document.getElementById("login").style.display="none";
   document.getElementById("main").style.display="flex";
 }
}

/* ENTER */
function enter(){
 document.getElementById("menu").style.display="flex";
 document.getElementById("back").style.display="block";
}

/* SHOW */
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
 document.getElementById(id).style.display="block";
}

/* BACK */
function back(){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
 document.getElementById("menu").style.display="flex";
}

/* QUOTES (FIXED 100% WORK) */
const quotes=[
"Darkness builds legends",
"Rise beyond limits",
"Core never fades",
"Survive and evolve",
"Become unstoppable",
"Fear is temporary",
"Pain becomes power",
"Shadows create warriors"
];

function newQuote(){
 document.getElementById("quote").innerText=
 quotes[Math.floor(Math.random()*quotes.length)];
}
newQuote();

/* ARCHIVE (FIXED) */
const archive=document.getElementById("archiveData");

for(let i=1;i<=100;i++){
 let div=document.createElement("div");
 div.innerHTML="BLDS LOG #"+i+" — MEMORY ACTIVE";
 archive.appendChild(div);
}

/* CODE (FIXED INPUT) */
function checkForgotten(){
 const v=document.getElementById("forgotInput").value.toLowerCase();
 const msg=document.getElementById("msg");

 if(v==="forgotten"){
   msg.innerHTML="ACCESS GRANTED";
   show('lore');
 }else{
   msg.innerHTML="ACCESS DENIED";
 }
}

</script>

</body>
</html>
