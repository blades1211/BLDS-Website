<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLDS | The Eclipse</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  color:white;
  font-family:'Poppins',sans-serif;
}

/* TITLE GLITCH */
.glitch{
  position:relative;
  display:inline-block;
  font-family:'Orbitron';
  font-size:3rem;
  text-align:center;
  margin:20px auto;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
}

.glitch::before{
  color:red;
  transform:translate(2px,0);
  animation:gl1 2s infinite;
}

.glitch::after{
  color:cyan;
  transform:translate(-2px,0);
  animation:gl2 2s infinite;
}

@keyframes gl1{
  0%,100%{clip-path:inset(0 0 80% 0);}
  50%{clip-path:inset(20% 0 20% 0);}
}

@keyframes gl2{
  0%,100%{clip-path:inset(80% 0 0 0);}
  50%{clip-path:inset(20% 0 20% 0);}
}

/* BUTTON */
button{
  cursor:pointer;
  padding:12px 20px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:25px;
  transition:0.3s;
}

button:hover{
  background:white;
  color:black;
}

/* MENU */
.menu{
  display:none;
  flex-direction:column;
  gap:15px;
  align-items:center;
  margin-top:20px;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  border:1px solid #333;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* MEMBER GRID */
.member-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

/* SECRET */
#secret{
  display:none;
  padding:20px;
  text-align:center;
  color:rgba(255,255,255,0.8);
}

/* ORIGIN BOX */
#origin{
  display:none;
  padding:20px;
  text-align:center;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  animation:fade 2s forwards;
  animation-delay:1.5s;
}

@keyframes fade{
  to{opacity:0;visibility:hidden;}
}

</style>
</head>

<body>

<div id="loading">LOADING...</div>

<h1 class="glitch" data-text="BLACKLIGHTDOMINION">BLACKLIGHTDOMINION</h1>

<div style="text-align:center;">
<button onclick="showMenu()">ENTER THE ECLIPSE</button>
</div>

<!-- MENU -->
<div class="menu" id="menu">

<button onclick="openPage('quotes')">QUOTES</button>
<button onclick="openPage('member')">MEMBER</button>
<button onclick="openPage('timeline')">ARCHIVE</button>
<button onclick="openOrigin()">ORIGIN</button>

</div>

<!-- ORIGIN PAGE -->
<div id="origin">
  <h2>ORIGIN</h2>
  <p>Klik ORIGIN 5x untuk unlock SECRET LORE</p>
</div>

<!-- SECRET -->
<div id="secret">
  <h2>THE FORGOTTEN ECLIPSE</h2>
  <p>Something buried inside the core...</p>
</div>

<!-- QUOTES -->
<div class="page" id="quotes">
<h2>QUOTES</h2>
<p>"Darkness builds legends."</p>
</div>

<!-- MEMBER -->
<div class="page member-grid" id="member">
<div class="card">MEMBERS: CLASSIFIED</div>
<div class="card">ACTIVE: 2024</div>
<div class="card">PROJECT: ONGOING</div>
<div class="card">STATUS: ALIVE</div>
</div>

<!-- TIMELINE -->
<div class="page" id="timeline">
<h2>ARCHIVE</h2>
<div class="card">BLDS BORN - 2024</div>
</div>

<script>

let originClick = 0;

/* MENU */
function showMenu(){
  document.getElementById("menu").style.display="flex";
}

/* PAGE SYSTEM */
function openPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.style.display="none";
  });

  document.getElementById("origin").style.display="none";
  document.getElementById("secret").style.display="none";

  document.getElementById(id).style.display="block";
}

/* ORIGIN CLICK SYSTEM */
function openOrigin(){

  document.querySelectorAll(".page").forEach(p=>{
    p.style.display="none";
  });

  document.getElementById("secret").style.display="none";

  document.getElementById("origin").style.display="block";

  originClick++;

  if(originClick >= 5){
    document.getElementById("origin").style.display="none";
    document.getElementById("secret").style.display="block";
  }
}

</script>

</body>
</html>
