<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BLDS | The Eclipse</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  background:#000;
  color:white;
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
}

/* GLITCH EFFECT */
.glitch{
  position:relative;
  display:inline-block;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  overflow:hidden;
  color:white;
}

.glitch::before{
  left:2px;
  text-shadow:-2px 0 red;
  animation:glitch1 2s infinite linear alternate-reverse;
}

.glitch::after{
  left:-2px;
  text-shadow:2px 0 cyan;
  animation:glitch2 2s infinite linear alternate-reverse;
}

@keyframes glitch1{
  0%{clip-path:inset(0 0 80% 0);}
  50%{clip-path:inset(20% 0 20% 0);}
  100%{clip-path:inset(80% 0 0 0);}
}

@keyframes glitch2{
  0%{clip-path:inset(80% 0 0 0);}
  50%{clip-path:inset(20% 0 20% 0);}
  100%{clip-path:inset(0 0 80% 0);}
}

/* TITLE */
h1{
  font-family:'Orbitron';
  text-align:center;
  font-size:3rem;
  margin-top:20px;
  text-shadow:0 0 20px white;
}

/* BUTTON */
button{
  cursor:pointer;
}

/* MENU */
.menu-buttons{
  display:none;
  flex-direction:column;
  gap:15px;
  align-items:center;
  margin-top:20px;
}

.menu-btn{
  padding:12px 25px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:30px;
}

/* PAGE */
.page{
  display:none;
  padding:30px;
}

/* MEMBER GRID FIX */
.member-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

/* CARD */
.card{
  padding:15px;
  border:1px solid #333;
  border-radius:10px;
  background:#111;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 2s forwards;
  animation-delay:2s;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

</style>
</head>

<body>

<div id="loading">LOADING...</div>

<h1 class="glitch" data-text="BLACKLIGHTDOMINION">BLACKLIGHTDOMINION</h1>

<div style="text-align:center;">
<button onclick="showMenu()">ENTER THE ECLIPSE</button>
</div>

<div class="menu-buttons" id="menu">

<button class="menu-btn" onclick="openPage('quotes')">QUOTES</button>
<button class="menu-btn" onclick="openPage('member')">MEMBER</button>
<button class="menu-btn" onclick="openPage('timeline')">ARCHIVE</button>

</div>

<!-- QUOTES -->
<div class="page" id="quotes">
<h2>QUOTES</h2>
<p>"Darkness builds legends."</p>
</div>

<!-- MEMBER -->
<div class="page member-grid" id="member">

<div class="card">MEMBERS: CLASSIFIED</div>
<div class="card">ACTIVE: 2024</div>
<div class="card">PROJECT: ONGOING</div>
<div class="card">STATUS: ALIVE</div>

</div>

<!-- TIMELINE -->
<div class="page" id="timeline">
<h2>ARCHIVE</h2>
<div class="card">BLDS BORN - 2024</div>
</div>

<script>

/* MENU */
function showMenu(){
  document.getElementById("menu").style.display="flex";
}

/* PAGE SWITCH */
function openPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.style.display="none";
  });

  document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
